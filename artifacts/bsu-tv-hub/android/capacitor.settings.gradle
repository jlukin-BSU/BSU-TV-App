// Points to the bundled capacitor-android library at android/capacitor-android/
// Using a local copy so the project builds on any machine after downloading the ZIP.
// Note: cap sync regenerates this file with a Replit-absolute pnpm path that won't
// work on a local computer. settings.gradle inlines the local path directly and
// does NOT apply this file, so regenerating it won't break local builds.
include ':capacitor-android'
project(':capacitor-android').projectDir = new File('./capacitor-android')
