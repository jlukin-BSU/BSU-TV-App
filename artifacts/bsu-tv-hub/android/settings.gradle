include ':app'
include ':capacitor-cordova-android-plugins'
project(':capacitor-cordova-android-plugins').projectDir = new File('./capacitor-cordova-android-plugins/')

// Capacitor plugins are bundled locally so the project builds on any machine
// without needing node_modules or a local `cap sync`.
// We do NOT apply capacitor.settings.gradle — cap sync regenerates it with
// absolute Replit paths that won't exist on a local computer.
include ':capacitor-android'
project(':capacitor-android').projectDir = new File('./capacitor-android')

include ':capacitor-device'
project(':capacitor-device').projectDir = new File('./capacitor-device')