kind = "web"
previewPath = "/"
title = "BSU TV Hub"
version = "1.0.0"
id = "artifacts/bsu-tv-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22140

[services.development]
run = "pnpm --filter @workspace/bsu-tv-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bsu-tv-hub", "run", "build" ]
publicDir = "artifacts/bsu-tv-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22140"
BASE_PATH = "/"
